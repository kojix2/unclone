name: build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            shell: bash
            package_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            shell: bash
            package_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            shell: msys2 {0}
            package_ext: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        if: matrix.target != 'x86_64-pc-windows-gnu'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Crystal
        if: matrix.target != 'x86_64-pc-windows-gnu'
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install build dependencies
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Install build dependencies
        if: matrix.target == 'aarch64-apple-darwin'
        run: brew install make libgc pcre2

      - name: Prepare macOS static Crystal libs
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          unset PKG_CONFIG_PATH
          mkdir -p .github/macos-static-libs
          ln -sf "$(brew ls libgc | grep '/libgc\.a$' | head -n 1)" .github/macos-static-libs/libgc.a
          ln -sf "$(brew ls pcre2 | grep '/libpcre2-8\.a$' | head -n 1)" .github/macos-static-libs/libpcre2-8.a
          echo "EXTRA_CRYSTAL_LINK_FLAGS=-L$PWD/.github/macos-static-libs $PWD/.github/macos-static-libs/libgc.a $PWD/.github/macos-static-libs/libpcre2-8.a" >> "$GITHUB_ENV"

      - name: Install Crystal and Rust (MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-crystal
            mingw-w64-x86_64-shards
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-gcc
            make
            zip

      - name: Set version variables
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="build-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BIN=tyclone" >> "$GITHUB_ENV"

      - name: Install dependencies
        if: matrix.target != 'x86_64-pc-windows-gnu'
        run: shards install --without-development

      - name: Install dependencies (MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: msys2 {0}
        run: shards install --without-development

      - name: Run tests
        if: matrix.target != 'x86_64-pc-windows-gnu' && matrix.target != 'aarch64-apple-darwin'
        run: make test

      - name: Run tests (macOS)
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          unset PKG_CONFIG_PATH
          make test EXTRA_CRYSTAL_LINK_FLAGS="$EXTRA_CRYSTAL_LINK_FLAGS"

      - name: Run tests (MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: msys2 {0}
        run: make test

      - name: Build release binary
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          docker run -d --name tyclone-alpine -v "$PWD":/workspace -w /workspace crystallang/crystal:latest-alpine tail -f /dev/null
          trap 'docker rm -f tyclone-alpine' EXIT
          docker exec tyclone-alpine apk add --no-cache build-base readline-dev readline-static ncurses-dev ncurses-static ncurses-libs rust cargo make
          mkdir -p .home .cargo .rustup
          docker exec -u "$(id -u):$(id -g)" -e HOME=/workspace/.home -e CARGO_HOME=/workspace/.cargo -e RUSTUP_HOME=/workspace/.rustup tyclone-alpine shards install --without-development
          docker exec -u "$(id -u):$(id -g)" -e HOME=/workspace/.home -e CARGO_HOME=/workspace/.cargo -e RUSTUP_HOME=/workspace/.rustup tyclone-alpine make build EXTRA_CRYSTAL_BUILD_FLAGS="--release --static"

      - name: Build release binary (Linux host check)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          ldd ./bin/tyclone || echo "Static binary (no dynamic dependencies)"
          file ./bin/tyclone

      - name: Build release binary (macOS)
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          unset PKG_CONFIG_PATH
          make build EXTRA_CRYSTAL_BUILD_FLAGS="--release" EXTRA_CRYSTAL_LINK_FLAGS="$EXTRA_CRYSTAL_LINK_FLAGS"

      - name: Build release binary (MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: msys2 {0}
        run: make build EXTRA_CRYSTAL_BUILD_FLAGS="--release --static"

      - name: Smoke test binary
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          ./bin/tyclone --help
          LDD_OUTPUT="$(ldd ./bin/tyclone 2>&1 || true)"
          printf '%s\n' "$LDD_OUTPUT"
          if printf '%s\n' "$LDD_OUTPUT" | grep -F 'libpcv_kernel.so'; then
            echo "Error: dynamic dependency on libpcv_kernel.so detected"
            exit 1
          fi

      - name: Smoke test binary (macOS)
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          ./bin/tyclone --help
          otool -L ./bin/tyclone
          if otool -L ./bin/tyclone | grep -E '/opt/homebrew|/usr/local/Cellar'; then
            echo "Error: Homebrew dynamic dependencies detected"
            exit 1
          fi

      - name: Smoke test binary (MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: msys2 {0}
        run: ./bin/tyclone.exe --help

      - name: Package artifact
        if: matrix.target != 'x86_64-pc-windows-gnu'
        run: |
          PKG="tyclone-${VERSION}-${{ matrix.target }}"
          mkdir -p "$PKG"
          cp ./bin/tyclone "$PKG/"
          cp LICENSE "$PKG/"
          cp README.md "$PKG/"
          tar czf "$PKG.tar.gz" "$PKG"

      - name: Package artifact (MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: msys2 {0}
        run: |
          PKG="tyclone-${VERSION}-${{ matrix.target }}"
          mkdir -p "$PKG"
          cp ./bin/tyclone.exe "$PKG/"
          cp LICENSE "$PKG/"
          cp README.md "$PKG/"
          zip -r "$PKG.zip" "$PKG"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tyclone-${{ matrix.target }}
          path: |
            tyclone-*.tar.gz
            tyclone-*.zip

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            tyclone-*.tar.gz
            tyclone-*.zip