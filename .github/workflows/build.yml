name: build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }} (${{ matrix.microarch }})
    runs-on: ${{ matrix.os }}
    env:
      # Applied to every cargo invocation (tests + release build) on the host.
      # The musl release build runs inside Docker, so it forwards this via `docker exec -e`.
      RUSTFLAGS: ${{ matrix.rustflags }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 Linux: portable baseline (SSE4.2) + AVX2/FMA build.
          # The hot VI contractions are ~2x faster with FMA (x86-64-v3, Haswell 2013+).
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            microarch: baseline
            rustflags: "-C target-cpu=x86-64-v2"
            shell: bash
            package_ext: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            microarch: v3
            rustflags: "-C target-cpu=x86-64-v3"
            shell: bash
            package_ext: tar.gz
          # Apple Silicon: aarch64 baseline already includes NEON+FMA, so no variant needed.
          - os: macos-latest
            target: aarch64-apple-darwin
            microarch: baseline
            rustflags: ""
            shell: bash
            package_ext: tar.gz
          # x86_64 Windows: same baseline + AVX2/FMA split as Linux.
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            microarch: baseline
            rustflags: "-C target-cpu=x86-64-v2"
            shell: msys2 {0}
            package_ext: zip
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            microarch: v3
            rustflags: "-C target-cpu=x86-64-v3"
            shell: msys2 {0}
            package_ext: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        if: matrix.target != 'x86_64-pc-windows-gnu'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Crystal
        if: matrix.target != 'x86_64-pc-windows-gnu'
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install build dependencies
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Install build dependencies
        if: matrix.target == 'aarch64-apple-darwin'
        run: brew install make libgc pcre2

      - name: Prepare macOS static Crystal libs
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          unset PKG_CONFIG_PATH
          mkdir -p .github/macos-static-libs
          ln -sf "$(brew ls libgc | grep '/libgc\.a$' | head -n 1)" .github/macos-static-libs/libgc.a
          ln -sf "$(brew ls pcre2 | grep '/libpcre2-8\.a$' | head -n 1)" .github/macos-static-libs/libpcre2-8.a
          echo "EXTRA_CRYSTAL_LINK_FLAGS=-L$PWD/.github/macos-static-libs $PWD/.github/macos-static-libs/libgc.a $PWD/.github/macos-static-libs/libpcre2-8.a" >> "$GITHUB_ENV"

      - name: Install Crystal and Rust (MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-crystal
            mingw-w64-x86_64-shards
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-gcc
            make
            zip

      - name: Set version variables
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="build-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BIN=unclone" >> "$GITHUB_ENV"

      - name: Install dependencies
        if: matrix.target != 'x86_64-pc-windows-gnu'
        run: shards install --without-development

      - name: Install dependencies (MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: msys2 {0}
        run: shards install --without-development

      - name: Run tests
        if: matrix.target != 'x86_64-pc-windows-gnu' && matrix.target != 'aarch64-apple-darwin'
        run: make test

      - name: Run tests (macOS)
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          unset PKG_CONFIG_PATH
          make test EXTRA_CRYSTAL_LINK_FLAGS="$EXTRA_CRYSTAL_LINK_FLAGS"

      - name: Run tests (MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: msys2 {0}
        run: make test

      - name: Build release binary
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          docker run -d --name unclone-alpine -v "$PWD":/workspace -w /workspace crystallang/crystal:latest-alpine tail -f /dev/null
          trap 'docker rm -f unclone-alpine' EXIT
          docker exec unclone-alpine apk add --no-cache build-base readline-dev readline-static ncurses-dev ncurses-static ncurses-libs rust cargo make
          mkdir -p .home .cargo .rustup
          docker exec -u "$(id -u):$(id -g)" -e HOME=/workspace/.home -e CARGO_HOME=/workspace/.cargo -e RUSTUP_HOME=/workspace/.rustup unclone-alpine shards install --without-development
          docker exec -u "$(id -u):$(id -g)" -e HOME=/workspace/.home -e CARGO_HOME=/workspace/.cargo -e RUSTUP_HOME=/workspace/.rustup -e RUSTFLAGS="$RUSTFLAGS" unclone-alpine make build release=1 EXTRA_CRYSTAL_BUILD_FLAGS="--static"

      - name: Build release binary (Linux host check)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          ldd ./bin/unclone || echo "Static binary (no dynamic dependencies)"
          file ./bin/unclone

      - name: Build release binary (macOS)
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          unset PKG_CONFIG_PATH
          make build release=1 EXTRA_CRYSTAL_LINK_FLAGS="$EXTRA_CRYSTAL_LINK_FLAGS"

      - name: Build release binary (MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: msys2 {0}
        run: make build release=1 EXTRA_CRYSTAL_BUILD_FLAGS="--static"

      - name: Smoke test binary
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          ./bin/unclone --help
          LDD_OUTPUT="$(ldd ./bin/unclone 2>&1 || true)"
          printf '%s\n' "$LDD_OUTPUT"
          if printf '%s\n' "$LDD_OUTPUT" | grep -F 'libpcv_kernel.so'; then
            echo "Error: dynamic dependency on libpcv_kernel.so detected"
            exit 1
          fi

      - name: Smoke test binary (macOS)
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          ./bin/unclone --help
          otool -L ./bin/unclone
          if otool -L ./bin/unclone | grep -E '/opt/homebrew|/usr/local/Cellar'; then
            echo "Error: Homebrew dynamic dependencies detected"
            exit 1
          fi

      - name: Smoke test binary (MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: msys2 {0}
        run: ./bin/unclone.exe --help

      - name: Package artifact
        if: matrix.target != 'x86_64-pc-windows-gnu'
        run: |
          PKG="unclone-${VERSION}-${{ matrix.target }}-${{ matrix.microarch }}"
          mkdir -p "$PKG"
          cp ./bin/unclone "$PKG/"
          cp LICENSE "$PKG/"
          cp README.md "$PKG/"
          tar czf "$PKG.tar.gz" "$PKG"

      - name: Package artifact (MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: msys2 {0}
        run: |
          PKG="unclone-${VERSION}-${{ matrix.target }}-${{ matrix.microarch }}"
          mkdir -p "$PKG"
          cp ./bin/unclone.exe "$PKG/"
          cp LICENSE "$PKG/"
          cp README.md "$PKG/"
          zip -r "$PKG.zip" "$PKG"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: unclone-${{ matrix.target }}-${{ matrix.microarch }}
          path: |
            unclone-*.tar.gz
            unclone-*.zip

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            unclone-*.tar.gz
            unclone-*.zip
